<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RL Gastos">
<meta name="theme-color" content="#0a0a09">
<title>RL Gastos</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════════════
   RL GASTOS — DEFINITIVE
   Design system: Warm carbon layers + lima accent as action signal.
   Native iOS/Mac feel: SF-style blur, spring physics, safe areas.
   ═══════════════════════════════════════════════════════════════════════════ */

:root {
  /* Depth planes — warm carbon, never blue-grey */
  --z0: #0a0a09;
  --z1: #111110;
  --z2: #181816;
  --z3: #1f1f1d;
  --z4: #272725;

  /* Borders */
  --line:    rgba(255,255,255,0.05);
  --line-h:  rgba(255,255,255,0.08);
  --line-a:  rgba(191,219,56,0.15);

  /* Text hierarchy */
  --t1: #f0eee8;
  --t2: #8a877d;
  --t3: #4a4842;
  --t4: #2a2926;

  /* Lima accent — earned, never decorative */
  --a:       #c2dd3a;
  --a-soft:  rgba(194,221,58,0.08);
  --a-mid:   rgba(194,221,58,0.15);
  --a-press: rgba(194,221,58,0.25);
  --a-text:  #d4ec5a;

  /* Semantic */
  --red:     #e8534e;
  --red-bg:  rgba(232,83,78,0.08);
  --green:   #5ec48e;
  --green-bg:rgba(94,196,142,0.08);

  /* Radius */
  --r-xs:  6px;
  --r-sm:  10px;
  --r-md:  14px;
  --r-lg:  18px;
  --r-xl:  22px;
  --r-pill:100px;

  /* Motion */
  --ease:   cubic-bezier(0.4, 0, 0.2, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --t-fast: 100ms;
  --t-mid:  180ms;
  --t-slow: 320ms;

  /* Safe areas */
  --sat: env(safe-area-inset-top, 0px);
  --sab: env(safe-area-inset-bottom, 0px);
}

* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  background: var(--z0);
  color: var(--t1);
  font-family: 'Instrument Sans', -apple-system, system-ui, sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  overscroll-behavior: none;
}

/* ─── NOISE TEXTURE OVERLAY ────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 180px;
  pointer-events: none;
  z-index: 9999;
}

/* ─── SCROLLBAR ─────────────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 0; height: 0; }

/* ─── HEADER ─────────────────────────────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  padding: calc(var(--sat) + 12px) 24px 14px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  background: rgba(10,10,9,0.82);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--line);
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-logo {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: var(--a);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  color: #0a0a09;
  letter-spacing: -0.02em;
}

.header-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--t1);
  letter-spacing: -0.01em;
}

.header-balance {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.02em;
  transition: color var(--t-mid) var(--ease);
  padding: 4px 10px;
  border-radius: var(--r-pill);
  background: var(--z2);
  border: 1px solid var(--line);
}

/* ─── SCREENS ─────────────────────────────────────────────────────────────── */
.screen {
  display: none;
  padding: 0 20px calc(var(--sab) + 88px);
  animation: screenIn 280ms var(--ease) forwards;
}
.screen.active { display: block; }

@keyframes screenIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── SECTION LABELS ─────────────────────────────────────────────────────── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
  margin: 24px 0 10px;
}

/* ─── TYPE TOGGLE ─────────────────────────────────────────────────────────── */
.type-toggle {
  display: flex;
  gap: 4px;
  margin: 20px 0 18px;
  background: var(--z1);
  padding: 3px;
  border-radius: var(--r-md);
  border: 1px solid var(--line);
  position: relative;
}

.type-slider {
  position: absolute;
  top: 3px;
  left: 3px;
  width: calc(50% - 3px);
  height: calc(100% - 6px);
  background: var(--z4);
  border-radius: var(--r-sm);
  transition: transform var(--t-slow) var(--spring);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  pointer-events: none;
}

.type-slider.right { transform: translateX(100%); }

.type-btn {
  flex: 1;
  padding: 10px 12px;
  background: none;
  border: none;
  border-radius: var(--r-sm);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.01em;
  cursor: pointer;
  color: var(--t3);
  transition: color var(--t-mid) var(--ease);
  position: relative;
  z-index: 1;
}

.type-btn.active { color: var(--t1); }
.type-btn.active-income { color: var(--green); }
.type-btn:active { transform: scale(0.97); }

/* ─── INPUT AREA ──────────────────────────────────────────────────────────── */
.input-area { position: relative; }

.main-input {
  width: 100%;
  background: var(--z1);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 16px 16px 44px;
  color: var(--t1);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 17px;
  font-weight: 400;
  line-height: 1.6;
  resize: none;
  outline: none;
  min-height: 110px;
  transition: border-color var(--t-mid) var(--ease), box-shadow var(--t-mid) var(--ease);
  -webkit-appearance: none;
}

.main-input::placeholder { color: var(--t4); font-weight: 400; }

.main-input:focus {
  border-color: var(--line-h);
  box-shadow: 0 0 0 3px var(--a-soft), inset 0 1px 2px rgba(0,0,0,0.2);
}

.input-hint {
  position: absolute;
  bottom: 14px;
  left: 16px;
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--t4);
  letter-spacing: 0.06em;
  pointer-events: none;
  display: flex;
  gap: 16px;
}

.input-hint span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.hint-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--t4);
}

/* ─── PARSE BUTTON ───────────────────────────────────────────────────────── */
.parse-btn {
  width: 100%;
  margin-top: 10px;
  padding: 14px 20px;
  background: var(--a);
  border: none;
  border-radius: var(--r-md);
  color: #0a0a09;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: transform 180ms var(--spring), filter var(--t-fast);
  position: relative;
  overflow: hidden;
}

.parse-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.parse-btn:active { transform: scale(0.975); filter: brightness(0.92); }

/* ─── CONFIRM CARD ──────────────────────────────────────────────────────── */
.confirm-card {
  display: none;
  margin-top: 14px;
  background: var(--z1);
  border: 1px solid var(--line-a);
  border-radius: var(--r-xl);
  overflow: hidden;
}

.confirm-card.visible {
  display: block;
  animation: cardReveal 320ms var(--spring) forwards;
}

@keyframes cardReveal {
  from { opacity: 0; transform: translateY(12px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.confirm-header {
  padding: 18px 20px 16px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.confirm-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
}

.confirm-amount-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.03em;
  color: var(--a);
}

.confirm-amount-display.income-val { color: var(--green); }

.confirm-body { padding: 16px 20px; }

.confirm-section { margin-bottom: 18px; }
.confirm-section:last-child { margin-bottom: 0; }

.confirm-section-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 10px;
}

.confirm-date-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-top: 1px solid var(--line);
}

.confirm-date-label {
  font-size: 11px;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.04em;
}

.confirm-date-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--t2);
}

/* ─── NOTE INPUT ──────────────────────────────────────────────────────────── */
.note-input {
  width: 100%;
  background: var(--z2);
  border: 1px solid var(--line);
  border-radius: var(--r-sm);
  padding: 10px 12px;
  color: var(--t1);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color var(--t-mid) var(--ease);
  -webkit-appearance: none;
}

.note-input::placeholder { color: var(--t4); }
.note-input:focus { border-color: var(--line-h); }

/* ─── CHIPS ───────────────────────────────────────────────────────────────── */
.selector-row { display: flex; gap: 6px; flex-wrap: wrap; }

.selector-chip {
  padding: 7px 13px;
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  font-size: 12px;
  font-family: 'Instrument Sans', sans-serif;
  font-weight: 500;
  color: var(--t2);
  background: var(--z2);
  cursor: pointer;
  transition: all var(--t-fast) var(--ease);
  white-space: nowrap;
}

.selector-chip:active { transform: scale(0.94); }

.selector-chip.selected {
  border-color: transparent;
  color: #0a0a09;
  background: var(--a);
  font-weight: 600;
}

/* ─── CONFIRM ACTIONS ─────────────────────────────────────────────────────── */
.confirm-actions {
  display: flex;
  gap: 8px;
  padding: 14px 20px 18px;
  border-top: 1px solid var(--line);
}

.btn-cancel {
  flex: 1;
  padding: 13px;
  background: var(--z3);
  border: none;
  border-radius: var(--r-sm);
  color: var(--t2);
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity var(--t-fast);
}

.btn-cancel:active { opacity: 0.6; }

.btn-save {
  flex: 2;
  padding: 13px;
  background: var(--a);
  border: none;
  border-radius: var(--r-sm);
  color: #0a0a09;
  font-family: 'Instrument Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 180ms var(--spring), filter var(--t-fast);
  position: relative;
  overflow: hidden;
}

.btn-save::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, transparent 60%);
  pointer-events: none;
}

.btn-save:active { transform: scale(0.97); filter: brightness(0.9); }

/* ─── PERIOD TABS ─────────────────────────────────────────────────────────── */
.period-tabs {
  display: flex;
  margin: 18px 0 16px;
  background: var(--z1);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 3px;
  position: relative;
}

.period-slider {
  position: absolute;
  top: 3px;
  height: calc(100% - 6px);
  background: var(--z4);
  border-radius: var(--r-sm);
  transition: all var(--t-slow) var(--spring);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  pointer-events: none;
}

.period-tab {
  flex: 1;
  padding: 9px 4px;
  border: none;
  border-radius: var(--r-sm);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  background: none;
  color: var(--t3);
  cursor: pointer;
  font-family: 'Instrument Sans', sans-serif;
  transition: color var(--t-mid) var(--ease);
  position: relative;
  z-index: 1;
}

.period-tab.active { color: var(--t1); }

/* ─── SUMMARY ─────────────────────────────────────────────────────────────── */
.summary-hero {
  background: var(--z1);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 24px 22px 20px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}

.summary-hero::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, var(--a-soft) 0%, transparent 70%);
  pointer-events: none;
}

.summary-hero-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 6px;
}

.summary-hero-sublabel {
  font-size: 11px;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 8px;
}

.summary-hero-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 34px;
  font-weight: 600;
  letter-spacing: -0.04em;
  color: var(--t1);
  line-height: 1;
  position: relative;
}

.summary-hero-amount.positive { color: var(--green); }
.summary-hero-amount.negative { color: var(--red); }

.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.summary-card {
  background: var(--z1);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: 16px 16px 14px;
}

.summary-card-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--t3);
  font-family: 'JetBrains Mono', monospace;
  margin-bottom: 8px;
}

.summary-card-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--t1);
  line-height: 1.2;
}

.summary-card-count {
  font-size: 11px;
  color: var(--t4);
  margin-top: 5px;
  font-family: 'JetBrains Mono', monospace;
}

/* ─── BREAKDOWN ───────────────────────────────────────────────────────────── */
.breakdown-card {
  background: var(--z1);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  overflow: hidden;
}

.breakdown-item {
  padding: 13px 16px;
  border-bottom: 1px solid var(--line);
  transition: background var(--t-fast);
}

.breakdown-item:last-child { border-bottom: none; }

.breakdown-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.breakdown-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--t1);
}

.breakdown-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: var(--t2);
  letter-spacing: -0.01em;
}

.breakdown-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--t3);
  margin-left: 6px;
}

.breakdown-bar {
  height: 3px;
  background: var(--z3);
  border-radius: 2px;
  overflow: hidden;
}

.breakdown-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 600ms var(--ease);
}

.breakdown-bar-fill.expense-fill {
  background: linear-gradient(90deg, var(--a) 0%, rgba(194,221,58,0.4) 100%);
}

.breakdown-bar-fill.income-fill {
  background: linear-gradient(90deg, var(--green) 0%, rgba(94,196,142,0.4) 100%);
}

/* ─── DAILY CHART (mini sparkline bars) ────────────────────────────────── */
.daily-chart {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 48px;
  padding: 0 2px;
  margin: 8px 0 4px;
}

.daily-bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  height: 100%;
}

.daily-bar {
  flex: 1;
  width: 100%;
  border-radius: 2px;
  background: var(--z3);
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: flex-end;
}

.daily-bar-fill {
  width: 100%;
  border-radius: 2px;
  background: var(--a);
  opacity: 0.5;
  transition: height 500ms var(--ease);
}

.daily-bar-fill.today {
  opacity: 1;
  background: var(--a);
}

.daily-bar-label {
  font-size: 8px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--t4);
  font-weight: 500;
}

/* ─── HISTORIAL ───────────────────────────────────────────────────────────── */
.entry-group-date {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--t4);
  font-family: 'JetBrains Mono', monospace;
  margin: 20px 0 6px;
  padding-left: 2px;
}

.entry-item {
  display: flex;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
  gap: 14px;
  position: relative;
  overflow: hidden;
  touch-action: pan-y;
}

.entry-item:last-child { border-bottom: none; }

.entry-icon {
  width: 36px; height: 36px;
  border-radius: var(--r-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.entry-icon.expense-icon { background: var(--z3); }
.entry-icon.income-icon  { background: var(--green-bg); }

.entry-left { flex: 1; min-width: 0; }

.entry-cat {
  font-size: 14px;
  font-weight: 500;
  color: var(--t1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-note {
  font-size: 12px;
  color: var(--t3);
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.entry-meta {
  font-size: 11px;
  color: var(--t3);
  margin-top: 2px;
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.01em;
}

.entry-right { text-align: right; flex-shrink: 0; }

.entry-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.entry-amount.expense { color: var(--t1); }
.entry-amount.income  { color: var(--green); }

.entry-date {
  font-size: 10px;
  color: var(--t4);
  margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
}

.entry-delete-zone {
  position: absolute;
  right: -60px;
  top: 0; bottom: 0;
  width: 60px;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 16px;
  font-weight: 600;
  transition: right 200ms var(--ease);
  border-radius: 0 var(--r-sm) var(--r-sm) 0;
  cursor: pointer;
}

.entry-content {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  transition: transform 200ms var(--ease);
}

/* ─── FILTER ROW ──────────────────────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 6px;
  margin: 16px 0 6px;
  overflow-x: auto;
  padding-bottom: 4px;

  scrollbar-width: none;
}

.filter-row::-webkit-scrollbar { display: none; }

.filter-chip {
  padding: 7px 14px;
  border: 1px solid var(--line);
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 500;
  color: var(--t3);
  background: var(--z2);
  cursor: pointer;
  white-space: nowrap;
  font-family: 'Instrument Sans', sans-serif;
  transition: all var(--t-fast) var(--ease);

.filter-chip:active { transform: scale(0.94); }

.filter-chip.active {
  background: var(--a-mid);
  border-color: rgba(194,221,58,0.25);

}

/* ─── BOTTOM NAV ──────────────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(10,10,9,0.88);

  display: flex;
  padding: 6px 0 calc(var(--sab) + 8px);

}

.bottom-nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 0;
  transition: transform 100ms var(--ease);
  position: relative;
}

.bottom-nav-btn:active { transform: scale(0.9); }

.nav-icon {
  width: 24px; height: 24px;
  position: relative;
}

.nav-icon svg {
  width: 24px; height: 24px;
  stroke: var(--t3);
  stroke-width: 1.8;
  fill: none;
  transition: stroke var(--t-mid) var(--ease);
}

.bottom-nav-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--t3);
  font-family: 'Instrument Sans', sans-serif;
  transition: color var(--t-mid) var(--ease);
}

.bottom-nav-btn.active .nav-icon svg { stroke: var(--a); }
.bottom-nav-btn.active .bottom-nav-label { color: var(--a); }

.bottom-nav-btn.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: var(--a);
  border-radius: 1px;
}

/* ─── EMPTY ───────────────────────────────────────────────────────────────── */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 72px 24px;
  gap: 12px;
  color: var(--t3);
}

.empty-state-icon {
  width: 40px; height: 40px;
  border-radius: 12px;
  background: var(--z2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;

}

.empty-state-text {
  font-size: 13px;
  font-weight: 400;
  color: var(--t3);
}

/* ─── TOAST ───────────────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(var(--sab) + 80px);
  left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--z4);
  border: 1px solid var(--line-h);
  color: var(--t1);
  padding: 10px 20px;
  border-radius: var(--r-pill);
  font-size: 12px;
  font-weight: 600;
  font-family: 'Instrument Sans', sans-serif;
  opacity: 0;
  transition: opacity var(--t-mid) var(--ease), transform var(--t-mid) var(--ease);
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
  letter-spacing: 0.01em;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ─── SETTINGS SCREEN ─────────────────────────────────────────────────────── */
.settings-section {
  margin-top: 20px;
}

.settings-item {
  display: flex;

.settings-item-label {

.btn-danger {

.btn-export {

/* ─── QUICK STATS ROW ─────────────────────────────────────────────────────── */
.quick-stats {

/* ─── ANIMATIONS ──────────────────────────────────────────────────────────── */
.fade-in-up {
  animation: fadeInUp 400ms var(--ease) forwards;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }

.stagger-1 { animation-delay: 40ms; }

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   RL GASTOS — ENGINE
   ═══════════════════════════════════════════════════════════════════════════ */

const CATEGORIES_EXPENSE = [
  'Gastos varios','Universidad','Salida Mica','Salida amigos',
  'Desayuno','Almuerzo','Cena','Cuidado personal',
  'Educación','Lujo','Ropa','Bebidas','Emergencia','Transporte','Hogar','Suscripción'
];

const CATEGORIES_INCOME = ['Interés','Salario','Viático','Otro ingreso'];

const MEDIOS = [
  'Efectivo','Débito Itaú','TC Itaú Normal',
  'TC Itaú Black','TC Atlas','TC GNB',
  'TC Sudameris Plus','TC Sudameris Clásica'
];

const CAT_ICONS = {
  'Gastos varios':'○','Universidad':'◇','Salida Mica':'♡','Salida amigos':'△',
  'Desayuno':'◑','Almuerzo':'●','Cena':'◐','Cuidado personal':'◈',
  'Educación':'□','Lujo':'✦','Ropa':'▪','Bebidas':'◉','Emergencia':'⚡',
  'Transporte':'→','Hogar':'⌂','Suscripción':'↻',
  'Interés':'↗','Salario':'$','Viático':'↗','Otro ingreso':'+'
};

const CAT_KEYWORDS = {
  'Universidad':      ['uni','universidad','ucatolica','católica','cuota uni','matrícula'],
  'Salida Mica':      ['mica','amor','salida mica','cena mica','date'],
  'Salida amigos':    ['amigos','amigo','salida amigos','boliche','bar','joda'],
  'Desayuno':         ['desayuno','café','coffee','cafetería','panadería','pan','medialunas'],
  'Almuerzo':         ['almuerzo','lunch','comida','super','supermercado','market','mercado'],
  'Cena':             ['cena','dinner','pizza'],
  'Cuidado personal': ['barberia','barbería','gym','peluquería','farmacia','farma','crema'],
  'Educación':        ['libro','libros','curso','ingles','inglés','anglo','educación','idioma'],
  'Lujo':             ['lujo','reloj','electrónico','electronico','gadget','apple','iphone','mac','tech'],
  'Ropa':             ['ropa','zapatilla','zapato','camisa','pantalon','pantalón','zapatillas','remera'],
  'Bebidas':          ['bebida','cerveza','alcohol','whisky','vino','trago','fernet','birra'],
  'Emergencia':       ['emergencia','urgencia','médico','medico','hospital'],
  'Transporte':       ['uber','taxi','bolt','bus','nafta','estacionamiento','combustible','gasolina'],
  'Hogar':            ['hogar','limpieza','luz','agua','internet','alquiler','expensa'],
  'Suscripción':      ['suscripción','suscripcion','netflix','spotify','youtube','premium','hbo','disney'],
  'Interés':          ['interés','interes','cobro','cuota cobrada','rendimiento'],
  'Salario':          ['salario','sueldo','pago trabajo','nómina'],
  'Viático':          ['viatico','viático','viaje'],
  'Otro ingreso':     ['otro ingreso','extra','freelance','venta']
};

const MEDIO_KEYWORDS = {
  'Efectivo':             ['efectivo','cash','en mano'],
  'Débito Itaú':          ['débito itaú','debito itaú','débito itau','debito itau','debito'],
  'TC Itaú Normal':       ['itaú normal','itau normal','tc itaú normal','tc itau normal'],
  'TC Itaú Black':        ['black','itaú black','itau black','5881'],
  'TC Atlas':             ['atlas','tc atlas'],
  'TC GNB':               ['gnb','tc gnb','banco gnb'],
  'TC Sudameris Plus':    ['sudameris plus','tc sudameris plus'],
  'TC Sudameris Clásica': ['sudameris clásica','sudameris clasica','tc sudameris clásica','tc sudameris clasica','sudameris'],
};

let entries       = JSON.parse(localStorage.getItem('rl_entries') || '[]');
let currentType   = 'expense';
let pendingEntry  = null;
let selectedCat   = null;
let selectedMedio = null;
let currentPeriod = 'hoy';
let currentFilter = 'todo';

/* ─── UTILS ────────────────────────────────────────────────────────────── */
function save() {
  localStorage.setItem('rl_entries', JSON.stringify(entries));
  updateHeader();
  renderQuickStats();
}

function parseAmount(text) {
  const t = text.toLowerCase().trim();
  const kMatch = t.match(/(\d+(?:[.,]\d+)?)\s*k\b/);
  if (kMatch) return Math.round(parseFloat(kMatch[1].replace(',','.')) * 1000);
  const mMatch = t.match(/(\d+(?:[.,]\d+)?)\s*m(?!e|i|a|o|u)/);
  if (mMatch) return Math.round(parseFloat(mMatch[1].replace(',','.')) * 1000000);
  const pyMatch = t.match(/(\d{1,3}(?:\.\d{3})+)(?!\d)/);
  if (pyMatch) return parseInt(pyMatch[1].replace(/\./g,''));
  const longMatch = t.match(/\b(\d{4,})\b/);
  if (longMatch) return parseInt(longMatch[1]);
  const shortMatch = t.match(/^(\d+)/);
  if (shortMatch) return parseInt(shortMatch[1]);
  return null;
}

function inferCategory(text, type) {
  const t = text.toLowerCase();
  const cats = type === 'income' ? CATEGORIES_INCOME : CATEGORIES_EXPENSE;
  let best = null;
  let bestLen = 0;
  for (const [cat, keywords] of Object.entries(CAT_KEYWORDS)) {
    if (!cats.includes(cat)) continue;
    for (const k of keywords) {
      if (t.includes(k) && k.length > bestLen) {
        best = cat;
        bestLen = k.length;
      }
    }
  }
  return best || (type === 'income' ? 'Otro ingreso' : 'Gastos varios');
}

function inferMedio(text) {
  const t = text.toLowerCase();
  let best = null;
  let bestLen = 0;
  for (const [medio, keywords] of Object.entries(MEDIO_KEYWORDS)) {
    for (const k of keywords) {
      if (t.includes(k) && k.length > bestLen) {
        best = medio;
        bestLen = k.length;
      }
    }
  }
  return best || 'Efectivo';
}

function formatGs(n) {
  if (n < 0) return '-₲\u00a0' + Math.abs(n).toLocaleString('es-PY');
  return '₲\u00a0' + n.toLocaleString('es-PY');
}

function formatGsShort(n) {
  const abs = Math.abs(n);
  if (abs >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (abs >= 1e3) return Math.round(n/1e3) + 'k';
  return n.toString();
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('es-PY', {day:'2-digit', month:'short'}) +
    ' · ' + d.toLocaleTimeString('es-PY', {hour:'2-digit', minute:'2-digit'});
}

function formatDateGroup(iso) {
  const d = new Date(iso);
  const today = new Date();
  const yesterday = new Date(today); yesterday.setDate(today.getDate()-1);
  if (d.toDateString() === today.toDateString()) return 'Hoy';
  if (d.toDateString() === yesterday.toDateString()) return 'Ayer';
  return d.toLocaleDateString('es-PY', {weekday:'long', day:'numeric', month:'short'});
}

/* ─── TYPE TOGGLE ──────────────────────────────────────────────────────── */
function setType(type) {
  currentType = type;
  const slider = document.getElementById('typeSlider');
  const btnE = document.getElementById('btnExpense');
  const btnI = document.getElementById('btnIncome');
  if (type === 'income') {
    slider.classList.add('right');
    btnE.className = 'type-btn';
    btnI.className = 'type-btn active active-income';
  } else {
    slider.classList.remove('right');
    btnE.className = 'type-btn active';
    btnI.className = 'type-btn';
  }
  cancelConfirm();
}

/* ─── PARSE INPUT (multi-line) ─────────────────────────────────────────── */
function parseInput() {
  const text = document.getElementById('mainInput').value.trim();
  if (!text) return;

  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  // If multiple lines, batch save
  if (lines.length > 1) {
    let count = 0;
    let total = 0;
    for (const line of lines) {
      const amount = parseAmount(line);
      if (!amount) continue;
      const cat = inferCategory(line, currentType);
      const medio = currentType === 'expense' ? inferMedio(line) : null;
      entries.unshift({
        amount, cat, medio,
        date: new Date().toISOString(),
        type: currentType,
        raw: line,
        note: '',
        id: Date.now().toString() + Math.random().toString(16).slice(2,8)
      });
      count++;
      total += amount;
    }
    if (count === 0) { showToast('No encontré montos'); return; }
    save();
    const inp = document.getElementById('mainInput');
    inp.value = '';
    inp.style.height = '110px';
    showToast(`${count} registros · ${formatGs(total)}`);
    return;
  }

  // Single line → confirm card
  const amount = parseAmount(text);
  if (!amount) { showToast('No encontré el monto'); return; }

  const cat   = inferCategory(text, currentType);
  const medio = currentType === 'expense' ? inferMedio(text) : null;
  const now   = new Date().toISOString();

  pendingEntry  = { amount, cat, medio, date: now, type: currentType, raw: text, note: '' };
  selectedCat   = cat;
  selectedMedio = medio;

  document.getElementById('confAmount').textContent = formatGs(amount);
  document.getElementById('confAmount').className = 'confirm-amount-display' + (currentType === 'income' ? ' income-val' : '');
  document.getElementById('confDate').textContent = formatDate(now);
  document.getElementById('noteInput').value = '';

  const cats = currentType === 'income' ? CATEGORIES_INCOME : CATEGORIES_EXPENSE;
  document.getElementById('catSelector').innerHTML = cats.map(c =>
    `<button class="selector-chip${c === cat ? ' selected' : ''}" onclick="selectCat(this,'${c}')">${c}</button>`
  ).join('');

  const medioSection = document.getElementById('medioSection');
  if (currentType === 'expense') {
    medioSection.style.display = '';
    document.getElementById('medioSelector').innerHTML = MEDIOS.map(m =>
      `<button class="selector-chip${m === medio ? ' selected' : ''}" onclick="selectMedio(this,'${m}')">${m}</button>`
    ).join('');
  } else {
    medioSection.style.display = 'none';
  }

  document.getElementById('confirmCard').className = 'confirm-card visible';
  document.getElementById('confirmCard').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectCat(el, cat) {
  selectedCat = cat;
  el.parentElement.querySelectorAll('.selector-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function selectMedio(el, medio) {
  selectedMedio = medio;
  el.parentElement.querySelectorAll('.selector-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function saveEntry() {
  if (!pendingEntry) return;
  entries.unshift({
    ...pendingEntry,
    cat:   selectedCat,
    medio: selectedMedio,
    note:  document.getElementById('noteInput').value.trim(),
    id:    Date.now().toString() + Math.random().toString(16).slice(2,8)
  });
  save();
  cancelConfirm();
  const inp = document.getElementById('mainInput');
  inp.value = '';
  inp.style.height = '110px';
  showToast('Guardado ✓');
}

function cancelConfirm() {
  document.getElementById('confirmCard').className = 'confirm-card';
  pendingEntry = null;
}

function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  renderHistorial();
  renderResumen();
}

/* ─── TOAST ────────────────────────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = 'toast', 2000);
}

/* ─── NAV ──────────────────────────────────────────────────────────────── */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.bottom-nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'resumen') renderResumen();
  if (name === 'historial') renderHistorial();
  if (name === 'ajustes') renderSettings();
  window.scrollTo({ top: 0 });
}

/* ─── PERIOD ───────────────────────────────────────────────────────────── */
function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updatePeriodSlider();
  renderResumen();
}

function updatePeriodSlider() {
  const tabs = document.getElementById('periodTabs');
  const active = tabs.querySelector('.period-tab.active');
  const slider = document.getElementById('periodSlider');
  if (!active) return;
  const tabRect = active.getBoundingClientRect();
  const parentRect = tabs.getBoundingClientRect();
  slider.style.left = (tabRect.left - parentRect.left) + 'px';
  slider.style.width = tabRect.width + 'px';
}

function filterByPeriod(arr, period) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return arr.filter(e => {
    const d = new Date(e.date);
    if (period === 'hoy') return d >= today;
    if (period === 'semana') {
      const wk = new Date(today);
      const day = today.getDay() === 0 ? 6 : today.getDay() - 1;
      wk.setDate(today.getDate() - day);
      return d >= wk;
    }
    if (period === 'mes') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
    return true;
  });
}

/* ─── RESUMEN ──────────────────────────────────────────────────────────── */
function renderResumen() {
  updatePeriodSlider();
  const filtered = filterByPeriod(entries, currentPeriod);
  const expenses = filtered.filter(e => e.type === 'expense');
  const incomes  = filtered.filter(e => e.type === 'income');
  const totalExp = expenses.reduce((s, e) => s + e.amount, 0);
  const totalInc = incomes.reduce((s, e) => s + e.amount, 0);
  const net = totalInc - totalExp;
  const el = document.getElementById('resumenContent');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">◎</div><span class="empty-state-text">Sin registros en este período</span></div>`;
    return;
  }

  // Category breakdown
  const byCat = {};
  expenses.forEach(e => { byCat[e.cat] = (byCat[e.cat] || 0) + e.amount; });
  const catEntries = Object.entries(byCat).sort((a,b) => b[1]-a[1]);
  const maxCat = catEntries[0]?.[1] || 1;

  // Medio breakdown
  const byMedio = {};
  expenses.forEach(e => { if (e.medio) byMedio[e.medio] = (byMedio[e.medio] || 0) + e.amount; });
  const medioEntries = Object.entries(byMedio).sort((a,b) => b[1]-a[1]);

  // Daily chart (last 7 days for week/month view)
  let dailyChart = '';
  if (currentPeriod === 'semana' || currentPeriod === 'mes') {
    const days = currentPeriod === 'semana' ? 7 : Math.min(new Date().getDate(), 31);
    const dayLabels = ['D','L','M','X','J','V','S'];
    const dailyTotals = [];
    const now = new Date();
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
      const dayStart = new Date(d);
      const dayEnd = new Date(d); dayEnd.setDate(d.getDate() + 1);
      const total = expenses.filter(e => {
        const ed = new Date(e.date);
        return ed >= dayStart && ed < dayEnd;
      }).reduce((s, e) => s + e.amount, 0);
      dailyTotals.push({
        total,
        label: currentPeriod === 'semana' ? dayLabels[d.getDay()] : d.getDate(),
        isToday: i === 0
      });
    }
    const maxDay = Math.max(...dailyTotals.map(d => d.total), 1);
    // For month view, only show up to 14 most recent
    const shown = currentPeriod === 'mes' ? dailyTotals.slice(-14) : dailyTotals;
    dailyChart = `
      <div class="section-label stagger-2 fade-in-up" style="opacity:0">Gasto diario</div>
      <div class="breakdown-card stagger-3 fade-in-up" style="opacity:0;padding:14px 12px 10px">
        <div class="daily-chart">
          ${shown.map(d => `
            <div class="daily-bar-wrap">
              <div class="daily-bar"><div class="daily-bar-fill ${d.isToday ? 'today' : ''}" style="height:${d.total ? Math.max(8, Math.round(d.total/maxDay*100)) : 0}%"></div></div>
              <span class="daily-bar-label">${d.label}</span>
            </div>
          `).join('')}
        </div>
      </div>`;
  }

  // Period subtitle
  const periodNames = {hoy:'hoy', semana:'esta semana', mes:'este mes', todo:'total acumulado'};

  el.innerHTML = `
    <div class="summary-hero fade-in-up" style="opacity:0">
      <div class="summary-hero-label">Balance neto</div>
      <div class="summary-hero-amount ${net >= 0 ? 'positive' : 'negative'}">${net >= 0 ? '+' : ''}${formatGs(net)}</div>
      <div class="summary-hero-sublabel">${filtered.length} registros ${periodNames[currentPeriod]}</div>
    </div>

    <div class="summary-grid">
      <div class="summary-card stagger-1 fade-in-up" style="opacity:0">
        <div class="summary-card-label">Gastos</div>
        <div class="summary-card-amount" style="color:var(--red)">${formatGs(totalExp)}</div>
        <div class="summary-card-count">${expenses.length} reg.</div>
      </div>
      <div class="summary-card stagger-1 fade-in-up" style="opacity:0">
        <div class="summary-card-label">Ingresos</div>
        <div class="summary-card-amount" style="color:var(--green)">${formatGs(totalInc)}</div>
        <div class="summary-card-count">${incomes.length} reg.</div>
      </div>
    </div>

    ${dailyChart}

    ${catEntries.length ? `
    <div class="section-label stagger-3 fade-in-up" style="opacity:0">Por categoría</div>
    <div class="breakdown-card stagger-3 fade-in-up" style="opacity:0">
      ${catEntries.map(([cat, amt]) => `
        <div class="breakdown-item">
          <div class="breakdown-row">
            <span class="breakdown-name">${CAT_ICONS[cat] || '○'} ${cat}</span>
            <span><span class="breakdown-amount">${formatGs(amt)}</span><span class="breakdown-pct">${Math.round(amt/totalExp*100)}%</span></span>
          </div>
          <div class="breakdown-bar"><div class="breakdown-bar-fill expense-fill" style="width:${Math.round(amt/maxCat*100)}%"></div></div>
        </div>`).join('')}
    </div>` : ''}

    ${medioEntries.length ? `
    <div class="section-label stagger-4 fade-in-up" style="opacity:0">Por tarjeta / medio</div>
    <div class="breakdown-card stagger-4 fade-in-up" style="opacity:0">
      ${medioEntries.map(([medio, amt]) => `
        <div class="breakdown-item">
          <div class="breakdown-row" style="margin-bottom:0">
            <span class="breakdown-name">${medio}</span>
            <span><span class="breakdown-amount">${formatGs(amt)}</span><span class="breakdown-pct">${Math.round(amt/totalExp*100)}%</span></span>
          </div>
        </div>`).join('')}
    </div>` : ''}`;
}

/* ─── FILTER ───────────────────────────────────────────────────────────── */
function buildFilterChips() {
  const cats = new Set(entries.map(e => e.cat));
  const allCats = ['todo', ...CATEGORIES_EXPENSE, ...CATEGORIES_INCOME].filter(c => c === 'todo' || cats.has(c));
  const shortLabels = {
    'todo':'Todo','Gastos varios':'Varios','Cuidado personal':'Personal',
    'Salida Mica':'Mica','Salida amigos':'Amigos','Otro ingreso':'Otro'
  };
  document.getElementById('filterRow').innerHTML = allCats.map(c =>
    `<button class="filter-chip${c === currentFilter ? ' active' : ''}" onclick="setFilter('${c}', this)">${shortLabels[c] || c}</button>`
  ).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('#filterRow .filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHistorial();
}

/* ─── HISTORIAL ────────────────────────────────────────────────────────── */
function renderHistorial() {
  buildFilterChips();
  const filtered = currentFilter === 'todo' ? [...entries] : entries.filter(e => e.cat === currentFilter);
  const el = document.getElementById('historialContent');

  if (filtered.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-state-icon">≡</div><span class="empty-state-text">Sin registros</span></div>`;
    return;
  }

  // Group by date
  const groups = {};
  filtered.forEach(e => {
    const key = new Date(e.date).toDateString();
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  let html = '';
  for (const [dateKey, items] of Object.entries(groups)) {
    const groupTotal = items.reduce((s, e) => e.type === 'expense' ? s + e.amount : s, 0);
    html += `<div class="entry-group-date">${formatDateGroup(items[0].date)}${groupTotal ? ' · ' + formatGs(groupTotal) : ''}</div>`;
    for (const e of items) {
      const icon = CAT_ICONS[e.cat] || '○';
      html += `
        <div class="entry-item" data-id="${e.id}">
          <div class="entry-content">
            <div class="entry-icon ${e.type === 'income' ? 'income-icon' : 'expense-icon'}">${icon}</div>
            <div class="entry-left">
              <div class="entry-cat">${e.cat}</div>
              ${e.note ? `<div class="entry-note">${e.note}</div>` : ''}
              <div class="entry-meta">${e.medio ?? (e.type === 'income' ? 'Ingreso' : '')}</div>
            </div>
            <div class="entry-right">
              <div class="entry-amount ${e.type}">${e.type === 'income' ? '+' : ''}${formatGs(e.amount)}</div>
              <div class="entry-date">${new Date(e.date).toLocaleTimeString('es-PY', {hour:'2-digit', minute:'2-digit'})}</div>
            </div>
          </div>
        </div>`;
    }
  }

  el.innerHTML = html;

  // Swipe to delete
  el.querySelectorAll('.entry-item').forEach(item => {
    let startX = 0, currentX = 0, swiping = false;
    item.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      swiping = true;
    }, { passive: true });
    item.addEventListener('touchmove', e => {
      if (!swiping) return;
      currentX = e.touches[0].clientX - startX;
      if (currentX > 0) currentX = 0;
      if (currentX < -80) currentX = -80;
      const content = item.querySelector('.entry-content');
      content.style.transform = `translateX(${currentX}px)`;
      content.style.transition = 'none';
    }, { passive: true });
    item.addEventListener('touchend', () => {
      swiping = false;
      const content = item.querySelector('.entry-content');
      content.style.transition = 'transform 200ms cubic-bezier(0.4,0,0.2,1)';
      if (currentX < -50) {
        content.style.transform = 'translateX(-80px)';
        // Show delete zone
        const id = item.dataset.id;
        if (!item.querySelector('.entry-delete-zone')) {
          const del = document.createElement('div');
          del.className = 'entry-delete-zone';
          del.style.right = '0';
          del.textContent = '✕';
          del.onclick = () => deleteEntry(id);
          item.appendChild(del);
        } else {
          item.querySelector('.entry-delete-zone').style.right = '0';
        }
      } else {
        content.style.transform = 'translateX(0)';
        const del = item.querySelector('.entry-delete-zone');
        if (del) del.style.right = '-60px';
      }
      currentX = 0;
    });
    // Reset on tap elsewhere
    item.addEventListener('click', (e) => {
      if (e.target.classList.contains('entry-delete-zone')) return;
      const content = item.querySelector('.entry-content');
      content.style.transition = 'transform 200ms cubic-bezier(0.4,0,0.2,1)';
      content.style.transform = 'translateX(0)';
      const del = item.querySelector('.entry-delete-zone');
      if (del) del.style.right = '-60px';
    });
  });
}

/* ─── QUICK STATS ──────────────────────────────────────────────────────── */
function renderQuickStats() {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayExp = entries.filter(e => e.type === 'expense' && new Date(e.date) >= today).reduce((s,e) => s+e.amount, 0);
  const wk = new Date(today);
  const day = today.getDay() === 0 ? 6 : today.getDay() - 1;
  wk.setDate(today.getDate() - day);
  const weekExp = entries.filter(e => e.type === 'expense' && new Date(e.date) >= wk).reduce((s,e) => s+e.amount, 0);
  const monthExp = entries.filter(e => e.type === 'expense' && new Date(e.date).getMonth() === now.getMonth() && new Date(e.date).getFullYear() === now.getFullYear()).reduce((s,e) => s+e.amount, 0);

  document.getElementById('quickStats').innerHTML = `
    <div class="quick-stat">
      <div class="quick-stat-val">${formatGsShort(todayExp)}</div>
      <div class="quick-stat-label">Hoy</div>
    </div>
    <div class="quick-stat">
      <div class="quick-stat-val">${formatGsShort(weekExp)}</div>
      <div class="quick-stat-label">Semana</div>
    </div>
    <div class="quick-stat">
      <div class="quick-stat-val">${formatGsShort(monthExp)}</div>
      <div class="quick-stat-label">Mes</div>
    </div>`;
}

/* ─── HEADER ───────────────────────────────────────────────────────────── */
function updateHeader() {
  const now = new Date();
  const monthEntries = entries.filter(e => {
    const d = new Date(e.date);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  const net = monthEntries.reduce((s, e) => e.type === 'income' ? s + e.amount : s - e.amount, 0);
  const el = document.getElementById('headerBalance');
  el.textContent = (net >= 0 ? '+' : '') + formatGs(net);
  el.style.borderColor = net >= 0 ? 'rgba(94,196,142,0.2)' : 'rgba(232,83,78,0.2)';
  el.style.background = net >= 0 ? 'rgba(94,196,142,0.06)' : 'rgba(232,83,78,0.06)';
  el.style.color = net >= 0 ? 'var(--green)' : 'var(--red)';
}

/* ─── SETTINGS ─────────────────────────────────────────────────────────── */
function renderSettings() {
  document.getElementById('settingsCount').textContent = entries.length;
  const bytes = new Blob([JSON.stringify(entries)]).size;
  document.getElementById('settingsSize').textContent = (bytes / 1024).toFixed(1) + ' KB';
}

function exportCSV() {
  if (entries.length === 0) { showToast('Sin datos para exportar'); return; }
  const header = 'Fecha,Tipo,Categoría,Monto,Medio,Nota\n';
  const rows = entries.map(e =>
    `${e.date},${e.type},${e.cat},${e.amount},${e.medio || ''},${(e.note || '').replace(/,/g, ';')}`
  ).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rl_gastos_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exportado');
}

function clearAll() {
  if (!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;
  if (!confirm('¿Estás seguro? Se perderán todos los registros.')) return;
  entries = [];
  save();
  renderSettings();
  showToast('Datos eliminados');
}

/* ─── INIT ─────────────────────────────────────────────────────────────── */
updateHeader();
renderQuickStats();

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}

// Auto-resize textarea
document.getElementById('mainInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.max(110, this.scrollHeight) + 'px';
});

// Period slider init
requestAnimationFrame(() => updatePeriodSlider());
window.addEventListener('resize', () => updatePeriodSlider());
</script>
